<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senior Benefit Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #1a2a3a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 520px;
      width: 100%;
      background: #fff;
      border: 1px solid #d8e2ef;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 12px;
      color: #0f3d6e;
    }
    p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #4a5f73;
      margin-bottom: 24px;
    }
    a {
      display: inline-block;
      background: #0f3d6e;
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
    }
    a:hover { background: #164f8c; }
  </style>
</head>
<body>
  <main>
    <h1>Senior Benefit Access</h1>
    <p>Helping seniors discover and access the benefits they deserve.</p>
    <a href="mailto:info@seniorbenefitaccess.org">Contact Us</a>
  </main>
</body>
</html>
